<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bigroc favicon">
  <defs>
    <linearGradient id="fav-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <!-- 定义字体样式，确保“锤”字显示美观 -->
    <style>
      .chinese-char {
      font-family: "Microsoft YaHei", "PingFang SC", "SimHei", sans-serif;
      font-weight: bold;
      font-size: 32px;
      fill: #f8fafc; /* 与原文字颜色一致 */
      }
    </style>
  </defs>
  <!-- 保留原有背景 -->
  <rect width="64" height="64" rx="16" fill="url(#fav-bg)" />
  <!-- 替换为“锤”字，居中显示 -->
  <text x="32" y="38" text-anchor="middle" dominant-baseline="middle" class="chinese-char">锤</text>
</svg>